<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | FundFlow</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #020617;
            color: #f8fafc;
        }

        main {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        section {
            max-width: 480px;
            padding: 24px;
            border-radius: 16px;
            background: #0f172a;
            border: 1px solid #334155;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        p {
            color: #cbd5e1;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h1>You are offline</h1>
            <p>FundFlow could not reach the network. Please check your connection and try again.</p>
        </section>
    </main>
</body>

</html>
